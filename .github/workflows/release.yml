name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Cache the ~200MB vendor/ tree across runs so we only download HLAE +
      # ffmpeg once per pinned-version. Cache key includes setup_vendor.py
      # because that's where the URLs live — bumping the pin invalidates
      # the cache automatically.
      - name: Cache vendor/ (HLAE + ffmpeg)
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ runner.os }}-${{ hashFiles('setup_vendor.py') }}

      - name: Download HLAE + ffmpeg into vendor/
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: python setup_vendor.py
        # ~150MB HLAE zip + ~80MB ffmpeg essentials zip → 5–8 min on cold cache.

      - name: Verify vendor/ is complete
        run: python setup_vendor.py --check

      - name: Build .exe with PyInstaller
        run: pyinstaller --noconfirm --clean FragReel.spec

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\FragReel.exe")) {
            Write-Error "FragReel.exe not produced"
            exit 1
          }
          $exe = Get-Item dist\FragReel.exe
          $exe | Select-Object Name, Length, LastWriteTime
          # Sanity: post-vendor bundle should clear ~250MB. A sub-50MB build
          # means PyInstaller skipped the vendor/ datas tree silently.
          if ($exe.Length -lt 100MB) {
            Write-Warning "FragReel.exe is suspiciously small ($($exe.Length) bytes) — vendor/ may not be bundled"
          }

      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: FragReel-unsigned
          path: dist/FragReel.exe
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # SignPath signing — uncomment after the project is approved.
  # Docs: https://about.signpath.io/documentation/build-system-integration/github
  # Required GitHub repo secrets:
  #   SIGNPATH_API_TOKEN
  # Required vars:
  #   SIGNPATH_ORG_ID, SIGNPATH_PROJECT_SLUG, SIGNPATH_POLICY_SLUG
  # ─────────────────────────────────────────────────────────────────
  # sign:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Submit to SignPath
  #       uses: signpath/github-action-submit-signing-request@v1
  #       with:
  #         api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
  #         organization-id: ${{ vars.SIGNPATH_ORG_ID }}
  #         project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
  #         signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
  #         github-artifact-id: ${{ needs.build.outputs.artifact-id }}
  #         wait-for-completion: true
  #         output-artifact-directory: signed

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: FragReel-unsigned
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/FragReel.exe
          draft: false
          prerelease: false
          generate_release_notes: true
