name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Cache the ~200MB vendor/ tree across runs so we only download HLAE +
      # ffmpeg once per pinned-version. Cache key includes setup_vendor.py
      # because that's where the URLs live — bumping the pin invalidates
      # the cache automatically.
      - name: Cache vendor/ (HLAE + ffmpeg)
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ runner.os }}-${{ hashFiles('setup_vendor.py') }}

      - name: Download HLAE + ffmpeg into vendor/
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: python setup_vendor.py
        # ~150MB HLAE zip + ~80MB ffmpeg essentials zip → 5–8 min on cold cache.

      - name: Verify vendor/ is complete
        run: python setup_vendor.py --check

      # Round 4c Fase 2 — Node + editor bundle pra escalabilidade user
      # final. setup_node.py baixa Node 20 LTS portable Win x64 (~30MB).
      # setup_editor.py copia editor Remotion + node_modules do sibling
      # repo `fragreel` clonado no step abaixo. Cache de Node por pinned
      # version (NODE_VERSION em setup_node.py).
      - name: Cache vendor/node/ (Node 20 LTS portable)
        id: node-cache
        uses: actions/cache@v4
        with:
          path: vendor/node
          key: node-${{ runner.os }}-${{ hashFiles('setup_node.py') }}

      - name: Download Node portable into vendor/node/
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: python setup_node.py

      - name: Verify vendor/node/ is complete
        run: python setup_node.py --check

      # Editor (Remotion) — checkout do sibling repo `fragreel` numa pasta
      # adjacente ao client repo (mesma convention de dev mode pro
      # `_resolve_editor_dir` discovery), depois `npm ci` no editor pra
      # popular node_modules, depois copia pra vendor/editor/.
      - name: Checkout fragreel sibling repo (editor source)
        uses: actions/checkout@v4
        with:
          repository: mathieuanduze/fragreel
          path: ../fragreel
          ref: main
          fetch-depth: 1

      - name: Set up Node.js (for npm ci)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ../fragreel/editor/package-lock.json

      - name: npm ci no editor (pra popular node_modules)
        working-directory: ../fragreel/editor
        run: npm ci

      - name: Copy editor → vendor/editor/ pra bundling
        run: python setup_editor.py --source ../fragreel/editor --force

      - name: Verify vendor/editor/ is complete
        run: python setup_editor.py --check

      # Sobrescreve version.py com a tag que disparou o workflow (ou um
      # sentinel pra workflow_dispatch manual). O .exe final sempre carrega
      # a versão que o CI registrou — nunca o fallback de dev. Isso elimina
      # o passo manual de bumpar version.py antes de tagear.
      - name: Inject version from tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            cat > version.py <<EOF
          # Auto-gerado por .github/workflows/release.yml a partir da tag ${tag}.
          # NÃO editar — qualquer mudança aqui é sobrescrita no próximo build.
          __version__ = "${tag}"
          EOF
          else
            sha_short="$(git rev-parse --short HEAD)"
            cat > version.py <<EOF
          # Auto-gerado: build manual via workflow_dispatch (sem tag).
          __version__ = "v0.0.0-manual-${sha_short}"
          EOF
          fi
          echo "--- version.py ---"
          cat version.py
          echo "------------------"

      - name: Build .exe with PyInstaller
        run: pyinstaller --noconfirm --clean FragReel.spec

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\FragReel.exe")) {
            Write-Error "FragReel.exe not produced"
            exit 1
          }
          $exe = Get-Item dist\FragReel.exe
          $exe | Select-Object Name, Length, LastWriteTime
          # Sanity check post-bundle:
          # - Round 4c Fase 1: ~250MB (HLAE 200MB + ffmpeg 50MB)
          # - Round 4c Fase 2: ~450-500MB (+ Node 30MB + editor 200MB)
          if ($exe.Length -lt 100MB) {
            Write-Warning "FragReel.exe is suspiciously small ($($exe.Length) bytes) — vendor/ may not be bundled"
          }
          if ($exe.Length -lt 350MB) {
            Write-Warning "FragReel.exe < 350MB — Node + editor bundle pode estar faltando (Fase 2)"
          }

      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: FragReel-unsigned
          path: dist/FragReel.exe
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # SignPath signing — uncomment after the project is approved.
  # Docs: https://about.signpath.io/documentation/build-system-integration/github
  # Required GitHub repo secrets:
  #   SIGNPATH_API_TOKEN
  # Required vars:
  #   SIGNPATH_ORG_ID, SIGNPATH_PROJECT_SLUG, SIGNPATH_POLICY_SLUG
  # ─────────────────────────────────────────────────────────────────
  # sign:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Submit to SignPath
  #       uses: signpath/github-action-submit-signing-request@v1
  #       with:
  #         api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
  #         organization-id: ${{ vars.SIGNPATH_ORG_ID }}
  #         project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
  #         signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
  #         github-artifact-id: ${{ needs.build.outputs.artifact-id }}
  #         wait-for-completion: true
  #         output-artifact-directory: signed

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: FragReel-unsigned
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/FragReel.exe
          draft: false
          prerelease: false
          generate_release_notes: true
